<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>포장이사 비교견적</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;}
body{
margin:0;
font-family:'Noto Sans KR',sans-serif;
background:#f2f4f8;
color:#111;
}

/* HEADER */
.header{
background:#0f1115;
color:#fff;
padding:16px 20px;
font-weight:800;
}

/* HERO */
.hero{
background:linear-gradient(135deg,#0f1115,#2a2f3a);
color:#fff;
padding:60px 20px;
text-align:center;
}

.hero h1{
margin:0;
font-size:30px;
font-weight:900;
line-height:1.3;
}

.hero p{
margin-top:12px;
opacity:0.8;
font-size:14px;
}

/* WRAP */
.wrap{
max-width:1000px;
margin:auto;
padding:20px;
}

/* SECTION TITLE */
.section-title{
font-size:16px;
font-weight:800;
margin:20px 0 10px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:14px;
}

.card{
background:#fff;
border-radius:14px;
padding:18px;
box-shadow:0 6px 18px rgba(0,0,0,0.06);
border:1px solid #eee;
}

.card h3{
margin:0 0 8px;
font-size:15px;
font-weight:800;
}

.card p{
margin:0;
font-size:13px;
color:#555;
line-height:1.6;
}

/* BANNER */
.banner{
margin-top:15px;
background:#fff;
border-radius:14px;
padding:16px;
border:1px solid #eee;
display:flex;
justify-content:space-between;
align-items:center;
font-size:13px;
}

/* CTA BOX */
.cta{
margin-top:20px;
background:#fff;
border-radius:16px;
padding:18px;
border:1px solid #e6e6e6;
box-shadow:0 8px 20px rgba(0,0,0,0.05);
}

.cta-title{
font-size:16px;
font-weight:900;
margin-bottom:8px;
}

.cta-sub{
font-size:13px;
color:#666;
margin-bottom:12px;
}

/* iframe FIX (핵심) */
.iframe-wrap{
width:100%;
min-height:650px;
overflow:hidden;
border-radius:12px;
background:#fff;
}

/* FOOT */
.footer{
text-align:center;
font-size:11px;
color:#888;
padding:25px 10px;
}

/* MOBILE FIX */
@media(max-width:768px){
.hero h1{font-size:22px;}
.grid{grid-template-columns:1fr;}
.banner{flex-direction:column;align-items:flex-start;gap:6px;}
.iframe-wrap{min-height:750px;}
}
</style>
</head>

<body>

<div class="header">
포장이사 비교견적 서비스
</div>

<div class="hero">
  <h1>포장이사 비용은 조건에 따라 달라집니다</h1>
  <p>지역 / 날짜 / 짐량에 따라 업체별 견적 차이가 발생합니다</p>
</div>

<div class="wrap">

  <div class="section-title">서비스 안내</div>

  <div class="grid">

    <div class="card">
      <h3>지역 기반 매칭</h3>
      <p>입력 지역 기준으로 가능한 업체가 자동 연결됩니다.</p>
    </div>

    <div class="card">
      <h3>조건별 견적</h3>
      <p>이사 조건에 따라 견적이 달라집니다.</p>
    </div>

    <div class="card">
      <h3>비교 구조</h3>
      <p>여러 업체 조건을 비교할 수 있습니다.</p>
    </div>

  </div>

  <div class="banner">
    <div>업체별 견적은 조건에 따라 차이가 발생</div>
    <div>비교 기반 선택</div>
  </div>

  <div class="cta">

    <div class="cta-title">이사 조건 입력</div>
    <div class="cta-sub">아래 정보를 입력하면 상담이 진행됩니다</div>

    <div class="iframe-wrap">
      <iframe name="ifrm_icode" id="ifrCCAl" scrolling="no" frameborder="0" width="100%"
      src="https://replyalba.com/intros/_frm/index.php?code=WrHxEC3ope"></iframe>
    </div>

  </div>

</div>

<div class="footer">
본 페이지는 제휴 마케팅이 포함될 수 있습니다.
</div>

<script src="https://replyalba.com/js/jquery-1.11.0.min.js"></script>
<script src="https://replyalba.com/js/iframeResizer.min.js"></script>
<script>
$("#ifrCCAl").iFrameResize({
  checkOrigin:true,
  heightCalculationMethod:"offset",
  scrolling:false,
  sizeHeight:true
});
</script>

</body>
</html>
