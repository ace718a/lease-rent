<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>신차 장기렌트 리스 비교센터</title>

<style>
body{margin:0;font-family:'Noto Sans KR',sans-serif;background:#111;color:#fff;}

header{
background:#000;padding:15px;text-align:center;
font-weight:900;font-size:20px;border-bottom:2px solid #ff3b30;
}

.hero{
background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.8)),
url('https://images.unsplash.com/photo-1503376780353-7e6692767b70?w=1200') center/cover;
padding:55px 20px;text-align:center;
}

.hero .badge{
background:#ff3b30;padding:5px 12px;border-radius:20px;
font-size:13px;font-weight:bold;display:inline-block;margin-bottom:10px;
}

.hero-title{
font-size:34px;
margin:10px 0;
line-height:1.3;
font-weight:900;
color:#ffd700;
text-shadow:0 0 10px rgba(255,215,0,.5);
}

.hero-sub{
margin:0;
font-size:20px;
font-weight:800;
color:#fff;
}

.container{max-width:960px;margin:auto;padding:20px;}

.section-title{
font-size:22px;font-weight:bold;text-align:center;margin:28px 0 14px;
}
.section-title span{color:#ff3b30;}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:18px;
margin-bottom:35px;
}

.car-card{
background:#222;border-radius:10px;overflow:hidden;
border:1px solid #333;
}

.car-card img{
width:100%;height:200px;object-fit:cover;
}

.car-detail{padding:14px;}

.car-tag{
display:inline-block;
background:#444;
font-size:11px;
padding:2px 6px;
border-radius:4px;
margin-bottom:6px;
}
.car-tag.hot{background:#ff3b30;}

.car-name{font-size:15px;font-weight:700;margin:4px 0;}

.price-del{
font-size:12px;color:#777;text-decoration:line-through;
}

.price-main{
font-size:17px;color:#ff3b30;font-weight:bold;
}

/* live */
.live-box{
background:#1a1a1a;
padding:12px;
border-radius:10px;
border:1px solid #2a2a2a;
margin-bottom:20px;
height:170px;
overflow:hidden;
}

.live-item{
font-size:13px;
padding:5px 0;
border-bottom:1px solid rgba(255,255,255,0.05);
}

.live-item span{
color:#ff3b30;font-weight:bold;
}

/* ⭐ 수정된 담당자 안내 */
.form-guide{
background:#0f0f0f;
border:2px solid #ff3b30;
padding:16px;
font-size:20px;
margin-bottom:12px;
color:#fff;
text-align:center;   /* 가운데 정렬 */
font-weight:700;     /* 굵게 */
line-height:1.5;
}

/* iframe */
.db-section{
background:#1a1a1a;
padding:15px;
border-radius:12px;
margin:20px 0 100px;
border:1px solid rgba(255,59,48,0.4);
}

#ifrCCAl{
width:100%;
min-height:720px;
border:none;
}

.footer-bar{
position:fixed;
bottom:0;
width:100%;
display:flex;
}

.footer-bar a{
flex:1;text-align:center;padding:18px;
font-weight:bold;text-decoration:none;
}

.btn-tel{background:#000;color:#fff;}
.btn-form{background:#ff3b30;color:#fff;}

@media(max-width:768px){
.grid{grid-template-columns:repeat(2,1fr);}
}
@media(max-width:480px){
.grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<header>국산·수입 장기렌트·리스 비교센터</header>

<div class="hero">
<div class="badge">모든 캐피탈 실시간 비교</div>

<h1 class="hero-title">
초기비용 0원 · 최저가 특가 진행중
</h1>

<p class="hero-sub">
최근 30일 상담 기준 승인율 98%
</p>
</div>

<div class="container">

<div class="section-title">이달의 <span>인기 특판 차량</span></div>

<div class="grid" id="carGrid"></div>

<div class="section-title">🚨 실시간 승인 현황</div>

<div class="live-box" id="liveBox"></div>

<div class="section-title">🚨 30초 빠른 상담 신청</div>

<div class="form-guide">
👉 담당자 선택은 비워두셔도 됩니다.<br>
자동으로 가장 빠른 상담 담당자가 연결됩니다.
</div>

<div class="db-section" id="consultation">
<iframe id="ifrCCAl"
src="https://replyalba.com/intros/_frm/index.php?code=ISviBzViFs"></iframe>
</div>

</div>

<div class="footer-bar">
<a class="btn-tel"
href="https://replyalba.com/pt/ISviBzViFs"
target="_blank"
rel="noopener">
리스렌트성지 바로가기
</a>

<a class="btn-form" href="#consultation">
무료 비교견적 확인
</a>
</div>
<script>

/* 차량 데이터 */
const cars = [
{name:"현대 그랜저",tag:"즉시출고",img:"https://github.com/ace718a/lease-rent/blob/main/%5B%EA%BE%B8%EB%AF%B8%EA%B8%B0%5DGr.jpg?raw=true",price:"253,960원~",old:"490,000원"},
{name:"기아 쏘렌토",tag:"인기SUV",img:"https://github.com/ace718a/lease-rent/blob/main/%5B%EA%BE%B8%EB%AF%B8%EA%B8%B0%5Dsorento.jpg?raw=true",price:"215,970원~",old:"510,000원"},
{name:"기아 카니발",tag:"패밀리",img:"https://raw.githubusercontent.com/ace718a/lease-rent/refs/heads/main/20260615_195403.png",price:"265,770원~",old:"580,000원"},
{name:"현대 아이오닉9",tag:"패밀리",img:"https://github.com/ace718a/lease-rent/blob/main/%5B%EA%BE%B8%EB%AF%B8%EA%B8%B0%5Dio9.jpg?raw=true",price:"485,700원~",old:"890,000원"},
{name:"벤츠 E클래스",tag:"법인추천",img:"https://github.com/ace718a/lease-rent/blob/main/%5B%EA%BE%B8%EB%AF%B8%EA%B8%B0%5DEC.jpg?raw=true",price:"620,000원~",old:"980,000원"},
{name:"기아 스포티지",tag:"가성비",img:"https://github.com/ace718a/lease-rent/blob/main/%5B%EA%BE%B8%EB%AF%B8%EA%B8%B0%5Dspo.jpg?raw=true",price:"204,700원~",old:"390,000원"}
];

const grid=document.getElementById("carGrid");

cars.forEach(c=>{
grid.innerHTML+=`
<div class="car-card">
<img src="${c.img}">
<div class="car-detail">
<div class="car-tag">${c.tag}</div>
<div class="car-name">${c.name}</div>
<div class="price-del">${c.old}</div>
<div class="price-main">${c.price}</div>
</div>
</div>`;
});

/* live */
const names=["김*우","이*준","박*현","최*석","정*호","오*민","강*우","윤*서","홍*진","장*훈"];
const carsName=["그랜저","쏘렌토","카니발","BMW 5","벤츠 E","스포티지","G80","쏘나타"];
const locs=["부산","서울","대구","인천","울산","창원"];

function getTime(){
const r=Math.random();
if(r<0.4) return "오늘";
if(r<0.7) return "어제";
if(r<0.85) return "2시간 전";
if(r<0.95) return "5시간 전";
return "방금 전";
}

const liveBox=document.getElementById("liveBox");

function addLive(){
const name=names[Math.floor(Math.random()*names.length)];
const car=carsName[Math.floor(Math.random()*carsName.length)];
const loc=locs[Math.floor(Math.random()*locs.length)];

const div=document.createElement("div");
div.className="live-item";
div.innerHTML=`${loc} ${name} 고객님 <b>${car}</b> 승인 완료 <span>(${getTime()})</span>`;

liveBox.prepend(div);

if(liveBox.children.length>10){
liveBox.removeChild(liveBox.lastChild);
}
}

for(let i=0;i<6;i++) addLive();
setInterval(addLive,2500);

</script>

</body>
</html>
