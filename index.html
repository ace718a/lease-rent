<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>신차 장기렌트 리스 가격비교 성지</title>

    <style>
        body {
            margin: 0;
            font-family: 'Noto Sans KR', sans-serif;
            background: #111;
            color: #fff;
        }

        header {
            background: #000;
            padding: 15px;
            text-align: center;
            font-weight: 900;
            font-size: 20px;
            color: #fff;
            border-bottom: 2px solid #ff3b30;
        }

        .hero {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)),
            url('https://images.unsplash.com/photo-1503376780353-7e6692767b70?w=1200&auto=format&fit=crop') no-repeat center/cover;
            padding: 60px 20px;
            text-align: center;
        }

        .hero .badge {
            background: #ff3b30;
            color: #fff;
            padding: 5px 12px;
            font-weight: bold;
            font-size: 13px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 15px;
        }

        .hero h1 {
            font-size: 32px;
            margin: 0 0 10px 0;
            font-weight: 900;
            line-height: 1.3;
        }

        .hero p {
            margin: 0;
            font-size: 16px;
            color: #ccc;
        }

        /* LIVE STATUS */
        .live-status {
            background: #222;
            max-width: 960px;
            margin: 20px auto;
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            text-align: center;
            border: 1px dashed #555;
        }

        .live-status span {
            color: #ff3b30;
            font-weight: bold;
        }

        .container {
            max-width: 960px;
            margin: auto;
            padding: 20px;
        }

        .section-title {
            font-size: 24px;
            font-weight: bold;
            margin: 30px 0 15px 0;
            text-align: center;
        }

        .section-title span {
            color: #ff3b30;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .car-card {
            background: #222;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #333;
        }

        .car-card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }

        .car-detail {
            padding: 15px;
        }

        .car-tag {
            background: #444;
            color: #fff;
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .car-tag.hot {
            background: #ff3b30;
        }

        .car-name {
            font-size: 16px;
            font-weight: bold;
            margin: 8px 0 4px 0;
        }

        .price-del {
            font-size: 12px;
            color: #777;
            text-decoration: line-through;
        }

        .price-main {
            font-size: 18px;
            font-weight: bold;
            color: #ff3b30;
        }

        /* 🔥 iframe 영역 개선 (화이트 제거 + 카드형) */
        .db-section {
            background: #1a1a1a;
            color: #fff;
            border-radius: 14px;
            padding: 15px;
            margin: 40px 0 100px 0;
            border: 1px solid rgba(255,59,48,0.4);
            box-shadow: 0 0 20px rgba(255,59,48,0.12);
        }

        #ifrCCAl {
            width: 100%;
            min-height: 750px;
            border: none;
        }

        .footer-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            display: flex;
            z-index: 1000;
        }

        .footer-bar a {
            flex: 1;
            text-align: center;
            padding: 18px;
            text-decoration: none;
            font-weight: bold;
            font-size: 18px;
        }

        .btn-tel { background: #000; color: #fff; }
        .btn-form { background: #ff3b30; color: #fff; }

        @media (max-width: 768px) {
            .grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .hero h1 { font-size: 24px; }
            .car-card img { height: 120px; }
        }

        @media (max-width: 480px) {
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

<body>

<header>국산·수입 장기렌트/리스 공식 특판센터</header>

<div class="hero">
    <div class="badge">모든 캐피탈사 실시간 비교</div>
    <h1>초기비용 0원 최저가 보장<br>🚨 6월 한정 특별 프로모션</h1>
    <p>비공개 추가 할인 적용, 최근 30일 상담 기준 승인율 98% 달성!</p>
</div>

<div class="container">

    <!-- 🔥 LIVE STATUS -->
    <div class="live-status">
        <div id="liveLog"></div>
    </div>

    <div class="section-title">이달의 <span>인기 차종 특판 리스트</span></div>

    <div class="grid">
        <div class="car-card">
            <img src="https://images.unsplash.com/photo-1617788138017-80ad40651399?w=400">
            <div class="car-detail">
                <span class="car-tag hot">즉시출고</span>
                <div class="car-name">현대 디 올 뉴 그랜저</div>
                <div class="price-del">월 490,000원</div>
                <div class="price-main">월 310,000원 ~</div>
            </div>
        </div>

        <div class="car-card">
            <img src="https://images.unsplash.com/photo-1533473359331-0135ef1b58bf?w=400">
            <div class="car-detail">
                <span class="car-tag hot">인기폭발</span>
                <div class="car-name">기아 더 뉴 쏘렌토</div>
                <div class="price-del">월 510,000원</div>
                <div class="price-main">월 340,000원 ~</div>
            </div>
        </div>
    </div>

    <div class="section-title" id="consultation">
        🚨 <span>30초 실시간 견적 신청</span>
    </div>

    <!-- 🔥 iframe -->
    <div class="db-section">
        <iframe id="ifrCCAl"
                scrolling="no"
                frameborder="0"
                src="https://replyalba.com/intros/_frm/index.php?code=ISviBzViFs">
        </iframe>
    </div>
</div>

<div class="footer-bar">
    <a class="btn-tel" href="tel:01000000000">📞 직통 전화상담</a>
    <a class="btn-form" href="#consultation">✏️ 실시간 최저가 신청</a>
</div>

<script>
/* 🔥 LIVE LOG 10개 자동 롤링 */
const logs = [
    '부산 해운대구 이*준 고객님 <b>쏘렌토 하이브리드</b> <span class="status-txt">심사 승인 완료</span> (방금 전)',
    '서울 강서구 박*현 고객님 <b>그랜저 IG</b> <span class="status-txt">심사 승인 완료</span> (1분 전)',
    '대구 수성구 김*진 고객님 <b>카니발 하이리무진</b> <span class="status-txt">심사 승인 완료</span> (2분 전)',
    '부산 사하구 최*석 고객님 <b>BMW 5시리즈</b> <span class="status-txt">심사 승인 완료</span> (3분 전)',
    '서울 송파구 정*호 고객님 <b>벤츠 E클래스</b> <span class="status-txt">심사 승인 완료</span> (3분 전)',
    '인천 남동구 오*민 고객님 <b>스포티지</b> <span class="status-txt">심사 승인 완료</span> (4분 전)',
    '부산 북구 강*우 고객님 <b>싼타페</b> <span class="status-txt">심사 승인 완료</span> (5분 전)',
    '서울 마포구 윤*서 고객님 <b>아반떼 CN7</b> <span class="status-txt">심사 승인 완료</span> (6분 전)',
    '울산 남구 장*훈 고객님 <b>G80</b> <span class="status-txt">심사 승인 완료</span> (7분 전)',
    '창원 성산구 홍*진 고객님 <b>쏘나타 디엣지</b> <span class="status-txt">심사 승인 완료</span> (8분 전)'
];

let i = 0;
document.getElementById("liveLog").innerHTML = `[실시간] ${logs[0]}`;

setInterval(() => {
    i = (i + 1) % logs.length;
    document.getElementById("liveLog").innerHTML = `[실시간] ${logs[i]}`;
}, 2500);

/* 🔥 iframe 최소 안정 보정 */
window.addEventListener("load", () => {
    const iframe = document.getElementById("ifrCCAl");
    iframe.style.minHeight = "750px";
});
</script>

</body>
</html>
