<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>리스렌트 상담</title>

<style>
body {margin:0;font-family:Arial;background:#f6f7fb;}
.header {background:#111827;color:#fff;padding:15px;text-align:center;}
.container {max-width:900px;margin:0 auto;padding:15px;}
.card {background:#fff;padding:15px;border-radius:10px;margin-top:15px;box-shadow:0 3px 10px rgba(0,0,0,0.08);}

button {
  width:100%;
  padding:14px;
  background:#2563eb;
  color:#fff;
  border:0;
  border-radius:8px;
  font-size:16px;
  margin-top:10px;
}

.subbtn {
  background:#10b981;
}
</style>
</head>

<body>

<div class="header">
리스 / 렌트 무료 상담
</div>

<div class="container">

<div class="card">
<h3>빠른 상담</h3>

<!-- 🔥 iframe 유지 -->
<iframe
  id="ifr"
  src="https://replyalba.com/intros/_frm/index.php?code=ISviBzViFs"
  width="100%"
  style="border:0;min-height:800px;">
</iframe>

<!-- 🔥 핵심: 외부 CPA 직접 링크 (DB 확보용) -->
<button onclick="goCPA()">👉 상담 바로가기 (DB확실반영)</button>

<button class="subbtn" onclick="fallback()">
상담이 안 뜨면 여기 클릭
</button>

</div>

</div>

<script>
const CPA_URL = "https://replyalba.com/intros/_frm/index.php?code=ISviBzViFs";

// 🔥 메인 전환 (DB 잡히는 핵심)
function goCPA(){
  // 클릭 즉시 외부 이동 → CPA 추적 확실
  window.location.href = CPA_URL;
}

// 🔥 fallback
function fallback(){
  window.open(CPA_URL, "_blank");
}
</script>

</body>
</html>
