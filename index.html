<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>신차 장기렌트 리스 가격비교 성지</title>
    <style>
        body { 
            margin: 0; 
            font-family: 'Noto Sans KR', sans-serif; 
            background: #111; 
            color: #fff;
        }
        header { 
            background: #000; 
            padding: 15px; 
            text-align: center; 
            font-weight: 900; 
            font-size: 20px;
            color: #fff;
            border-bottom: 2px solid #ff3b30;
        }
        
        .hero { 
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1503376780353-7e6692767b70?w=1200&auto=format&fit=crop') no-repeat center/cover;
            padding: 60px 20px; 
            text-align: center; 
        }

        .hero .badge {
            background: #ff3b30;
            color: #fff;
            padding: 5px 12px;
            font-weight: bold;
            font-size: 13px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 15px;
        }

        .hero h1 { 
            font-size: 32px; 
            margin: 0 0 10px 0; 
            font-weight: 900;
            line-height: 1.3;
        }

        .hero p {
            margin: 0;
            font-size: 16px;
            color: #ccc;
        }

        .live-status {
            background: #222;
            max-width: 960px;
            margin: 20px auto;
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            text-align: center;
            border: 1px dashed #555;
        }

        .live-status span { color: #ff3b30; font-weight: bold; }

        .container {
            max-width: 960px;
            margin: auto;
            padding: 20px;
        }

        .section-title {
            font-size: 24px;
            font-weight: bold;
            margin: 30px 0 15px 0;
            text-align: center;
        }

        .section-title span { color: #ff3b30; }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .car-card {
            background: #222;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #333;
        }

        .car-card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }

        .car-detail {
            padding: 15px;
        }

        .car-tag {
            background: #444;
            color: #fff;
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .car-tag.hot { background: #ff3b30; }

        .car-name {
            font-size: 16px;
            font-weight: bold;
            margin: 8px 0 4px 0;
        }

        .price-del {
            font-size: 12px;
            color: #777;
            text-decoration: line-through;
        }

        .price-main {
            font-size: 18px;
            font-weight: bold;
            color: #ff3b30;
        }

        .db-section {
            background: #fff;
            color: #333;
            border-radius: 12px;
            padding: 15px;
            margin: 40px 0 100px 0;
            box-shadow: 0 4px 20px rgba(255,59,48,0.2);
            border: 3px solid #ff3b30;
        }
        
        .footer-bar { 
            position: fixed; 
            bottom: 0; 
            left: 0;
            width: 100%; 
            display: flex; 
            z-index: 1000;
        }

        .footer-bar a { 
            flex: 1; 
            text-align: center; 
            padding: 18px; 
            text-decoration: none; 
            font-weight: bold; 
            font-size: 18px;
        }

        .btn-tel { background: #000; color: #fff; }
        .btn-form { background: #ff3b30; color: #fff; }

        @media (max-width: 768px) {
            .grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .hero h1 { font-size: 24px; }
            .car-card img { height: 120px; }
        }

        @media (max-width: 480px) {
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

<body>

<header>국산·수입 장기렌트/리스 공식 특판센터</header>

<div class="hero">
    <div class="badge">모든 캐피탈사 실시간 비교</div>
    <h1>초기비용 0원 최저가 보장<br>🚨 6월 한정 특별 프로모션</h1>
    <p>비공개 추가 할인 적용, 심사 승인율 98% 달성!</p>
</div>

<div class="container">

    <div class="live-status">
        [실시간] 서울 강남구 김*우 고객님 <b>그랜저 하이브리드</b> <span class="status-txt">심사 승인 완료</span> (방금 전)
    </div>

    <div class="section-title">이달의 <span>인기 차종 특판 리스트</span></div>

    <div class="grid">
        <!-- 차량 카드들 -->
    </div>

    <div class="section-title" id="consultation">🚨 <span>30초 실시간 견적 신청</span></div>

    <div class="db-section">
        <iframe name="ifrm_icode" id="ifrCCAl" src="https://replyalba.com/intros/_frm/index.php?code=ISviBzViFs"></iframe>
    </div>

</div>

<div class="footer-bar">
    <a class="btn-tel" href="tel:01000000000">📞 직통 전화상담</a>
    <a class="btn-form" href="#consultation">✏️ 실시간 최저가 신청</a>
</div>

<script src="https://replyalba.com/js/jquery-1.11.0.min.js"></script>
<script src="https://replyalba.com/js/iframeResizer.min.js"></script>

<script>
$("#ifrCCAl").iFrameResize({
    heightCalculationMethod: "offset",
    checkOrigin: true
});
</script>

</body>
</html>
