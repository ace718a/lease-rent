}

p{

font-size:13px;
color:#aaa;

text-decoration:none;
}

.badge{
display:inline-block;
margin-top:8px;
font-size:11px;
padding:3px 8px;
background:#333;
border-radius:6px;
color:#aaa;
}

footer{
text-align:center;
padding:20px;
