<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>뉴스 허브</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#0f0f0f;
color:#fff;
}

header{
padding:20px;
text-align:center;
font-size:22px;
font-weight:800;
background:#111;
border-bottom:1px solid #222;
}

.container{
max-width:900px;
margin:0 auto;
padding:20px;
}

.card{
background:#1a1a1a;
padding:15px;
margin-bottom:12px;
border-radius:10px;
border:1px solid #2a2a2a;
}

.card h3{
margin:0 0 8px 0;
font-size:16px;
}

.card p{
margin:0;
font-size:13px;
color:#bbb;
}

.tag{
display:inline-block;
margin-top:8px;
font-size:11px;
padding:3px 8px;
background:#333;
border-radius:6px;
color:#aaa;
}

a{
color:#fff;
text-decoration:none;
}
a:hover{
text-decoration:underline;
}

footer{
text-align:center;
padding:20px;
font-size:12px;
color:#666;
}
</style>
</head>

<body>

<header>
오늘의 주요 뉴스
</header>

<div class="container">

<a href="#">
<div class="card">
<h3>경제·부동산 주요 이슈 정리</h3>
<p>최근 시장 흐름과 핵심 변화 포인트를 한눈에 확인</p>
<div class="tag">경제</div>
</div>
</a>

<a href="#">
<div class="card">
<h3>생활 정보 및 실속 뉴스 모음</h3>
<p>일상에 바로 적용 가능한 정보만 선별</p>
<div class="tag">생활</div>
</div>
</a>

<a href="#">
<div class="card">
<h3>자동차 / 금융 트렌드 업데이트</h3>
<p>금리, 보험, 차량 관련 최신 흐름 정리</p>
<div class="tag">금융</div>
</div>
</a>

<a href="#">
<div class="card">
<h3>핫 이슈 & 실시간 트렌드</h3>
<p>지금 가장 많이 언급되는 이슈 모음</p>
<div class="tag">트렌드</div>
</div>
</a>

</div>

<footer>
© news hub
</footer>

</body>
</html>
